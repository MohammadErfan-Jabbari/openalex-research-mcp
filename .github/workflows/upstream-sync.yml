name: Upstream Sync

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Merge upstream/master into sync branch
        run: |
          git remote add upstream https://github.com/oksure/openalex-research-mcp.git || true
          git fetch upstream master
          git checkout -b "upstream-sync-${GITHUB_RUN_ID}"
          git merge --no-ff --no-edit upstream/master

      - name: Create sync pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: "upstream-sync-${{ github.run_id }}"
          base: master
          title: "chore: sync upstream/master"
          body: |
            Automated upstream sync from `oksure/openalex-research-mcp`.

            - Source: `upstream/master`
            - Target: `master`
            - Trigger: `${{ github.event_name }}`
          commit-message: "chore: sync upstream/master"
